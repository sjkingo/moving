      logEvent('rank-reset', 'listings', 'bulk', String(ranked.length) + ' listing(s)');
    } catch (err) {
      console.error('reset ranks failed', err);
      alert('Reset failed: ' + (err.code || err.message));
    }
  });

  // ─────────────────────────────────────────────────────────────────────────
  // Seed (idempotent) — runs once per signed-in editor session if a collection
  // is empty. Uses setDoc with deterministic IDs so re-runs no-op safely.
  // ─────────────────────────────────────────────────────────────────────────
  async function seedIfEmpty() {
    const seeds = [
      { coll: 'listings', items: SEED_LISTINGS, idFn: listingId },
      { coll: 'stays',    items: SEED_STAYS,    idFn: stayId },
      { coll: 'schools',  items: SEED_SCHOOLS,  idFn: schoolId },
    ];
    for (const { coll, items, idFn } of seeds) {
      const snap = await getDocs(collection(db, coll));
      if (!snap.empty) continue;
      console.log(`Seeding ${coll} with ${items.length} docs…`);
      for (const item of items) {
        const id = idFn(item);
        await setDoc(doc(db, coll, id), {
          ...item,
          deleted: false,
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp(),
        });
      }
    }
  }

  // ─────────────────────────────────────────────────────────────────────────
  // Backfill `deleted: false` on existing docs that predate the field.
  // Without this, where('deleted','==',false) hides them.
  // ─────────────────────────────────────────────────────────────────────────
  async function backfillDeletedFlag() {
    for (const t of ['listings', 'stays', 'schools']) {
      const snap = await getDocs(collection(db, t));
      const writes = [];
      snap.docs.forEach(d => {
        const data = d.data();
        if (typeof data.deleted !== 'boolean') {
          writes.push(updateDoc(doc(db, t, d.id), { deleted: false }));
        }
      });
      if (writes.length) {
        console.log(`Backfilling deleted=false on ${writes.length} ${t} doc(s)…`);
        await Promise.all(writes);
      }
    }
  }

  // ─────────────────────────────────────────────────────────────────────────
  // Listeners — only attached once per signed-in session.
  //
  // Each active collection: where('deleted','==',false). Each "deleted ==
  // true" listener appends to a combined state.deleted array tagged with
  // _type so the trash panel can render and restore generically.
  // ─────────────────────────────────────────────────────────────────────────
  let unsubs = [];
  const deletedByType = { listings: [], stays: [], schools: [] };
  function rebuildDeleted() {
    state.deleted = [].concat(
      deletedByType.listings.map(d => ({ ...d, _type: 'listing' })),
      deletedByType.stays   .map(d => ({ ...d, _type: 'stay' })),
      deletedByType.schools .map(d => ({ ...d, _type: 'school' })),
    ).sort((a, b) => {
      const ta = a.deletedAt && a.deletedAt.toMillis ? a.deletedAt.toMillis() : 0;
      const tb = b.deletedAt && b.deletedAt.toMillis ? b.deletedAt.toMillis() : 0;
      return tb - ta;
    });
  }

  function attachListeners() {
    detachListeners();
    const live = [
      { coll: 'listings', stateKey: 'listings' },
      { coll: 'stays',    stateKey: 'stays' },
      { coll: 'schools',  stateKey: 'schools' },
    ];
    for (const { coll, stateKey } of live) {
      unsubs.push(onSnapshot(
        query(collection(db, coll), where('deleted', '==', false)),
        snap => {
          let items = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          if (stateKey === 'listings') items = sortListingsByRank(items);
          state[stateKey] = items;
          render();
          if (stateKey === 'listings' || stateKey === 'schools') {
            refreshOpenListingPopup();
          }
        },
        err => console.error(coll + ' listener:', err)
      ));
      unsubs.push(onSnapshot(
        query(collection(db, coll), where('deleted', '==', true)),
        snap => {
          deletedByType[coll] = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          rebuildDeleted();
          renderTrashPanel();
        },
        err => console.error(coll + ' trash listener:', err)
      ));
    }
    // History — last 100 events, newest first
    unsubs.push(onSnapshot(
      query(collection(db, 'events'), orderBy('at', 'desc'), limit(100)),
      snap => {
        state.history = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderHistoryPanel();
      },
      err => console.error('events listener:', err.code || err.message)
    ));
  }
  function detachListeners() {
    unsubs.forEach(u => { try { u(); } catch (_) {} });
    unsubs = [];
    deletedByType.listings = [];
    deletedByType.stays    = [];
    deletedByType.schools  = [];
    state.deleted = [];
    state.history = [];
  }

  // ─────────────────────────────────────────────────────────────────────────
  // Add-new flow (Listing / Stay / School)
  //
  // Three ways to set a location:
  //   1. Geocode search — type address/town, click a result.
  //   2. Manual lat/lng — paste from another source.
  //   3. Click on map — toggle map-click mode from the modal, then click.
  //
  // The Save button is disabled until: location is set AND all addRequired
  // fields for the selected type are non-empty.
  // ─────────────────────────────────────────────────────────────────────────
  let pinDropMode = false;          // map-click selection mode
  let pendingPinLatLng = null;
  let pendingPinLabel  = null;
  let activeTypeKey    = null;      // 'listing' | 'stay' | 'school' while modal open
  let pendingFieldInputs = {};      // key -> input/textarea element (for current type)

  function setPinDropMode(on) {
    pinDropMode = on;
    document.body.classList.toggle('pin-drop-mode', on);
    addBtn.classList.toggle('active', on);
    addBtn.textContent = on ? '📍 Click on map (Esc to cancel)' : '➕ Add';
  }

  function clearTypeFields() {
    pinTypeFields.innerHTML = '';
    pendingFieldInputs = {};
  }

  // Build the type-specific field block inside the modal.
  // Reuses the same buildFieldNode used for in-place popup editing, so the
  // look is consistent between "add" and "edit".
  function buildAddFields(typeKey, prefill = {}) {
    clearTypeFields();
    const t = TYPES[typeKey];
    for (const f of t.fields) {
      const node = buildFieldNode(f, prefill[f.key] || '');
      pinTypeFields.appendChild(node);
      const input = node.querySelector('.field-input');
      if (input) {
        pendingFieldInputs[f.key] = input;
        input.addEventListener('input', updateSaveEnabled);
      }
    }
  }

  function updateSaveEnabled() {
    if (!activeTypeKey) { pinSaveBtn.disabled = true; return; }
    if (!pendingPinLatLng) { pinSaveBtn.disabled = true; return; }
    const t = TYPES[activeTypeKey];
    for (const key of t.addRequired) {
      const el = pendingFieldInputs[key];
      if (!el || !el.value.trim()) { pinSaveBtn.disabled = true; return; }
    }
    pinSaveBtn.disabled = false;
  }

  function resetPinModal() {
    pendingPinLatLng = null;
    pendingPinLabel  = null;
    activeTypeKey    = null;
    pinSearchIn.value = '';
    pinSearchStatus.textContent = '';
    pinSearchResults.innerHTML = '';
    pinSearchResults.classList.remove('has-results');
    pinLatIn.value = '';
    pinLngIn.value = '';
    clearTypeFields();
    pinSummary.textContent = 'No location selected yet.';
    pinSummary.classList.remove('set');
    pinSaveBtn.disabled = true;
    document.getElementById('pin-manual-details').open = false;
  }

  function openAddModal(typeKey, { lat, lng, label } = {}) {
    resetPinModal();
    activeTypeKey = typeKey;
    pinModalTitle.textContent = 'Add ' + TYPES[typeKey].label.toLowerCase();
    pinModalBd.style.display = 'flex';
    buildAddFields(typeKey);
    if (typeof lat === 'number' && typeof lng === 'number') {
      setPendingLocation(lat, lng, label || null);
    }
    setTimeout(() => {
      if (pendingPinLatLng) {
        // jump to the first required field input
        const firstKey = TYPES[typeKey].addRequired[0];
        const el = pendingFieldInputs[firstKey];
        if (el) el.focus(); else pinSearchIn.focus();
      } else {
        pinSearchIn.focus();
      }
    }, 0);
  }

  function setPendingLocation(lat, lng, label) {
    pendingPinLatLng = { lat, lng };
    pendingPinLabel  = label;
    pinSummary.textContent = (label ? label + '  ·  ' : '') +
      `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
    pinSummary.classList.add('set');
    // Pre-fill the type-appropriate first text field with the label, if empty
    if (label && activeTypeKey) {
      const firstKey = TYPES[activeTypeKey].addRequired[0];
      const el = pendingFieldInputs[firstKey];
      if (el && !el.value.trim()) el.value = label;
    }
    pinLatIn.value = lat;
    pinLngIn.value = lng;
    updateSaveEnabled();
  }

  // Type-chooser popover
  function openTypeChooser() {
    typeChooser.style.display = 'flex';
  }
  function closeTypeChooser() {
    typeChooser.style.display = 'none';
  }
  typeChooser.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      const t = btn.dataset.type;
      closeTypeChooser();
      openAddModal(t);
    });
  });
  // Close popover on outside click
  document.addEventListener('click', e => {
    if (typeChooser.style.display !== 'flex') return;
    if (typeChooser.contains(e.target) || addBtn.contains(e.target)) return;
    closeTypeChooser();
  });

  // "+ Add" toolbar button — opens the type chooser
  addBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (pinDropMode) { setPinDropMode(false); return; }
    if (typeChooser.style.display === 'flex') closeTypeChooser();
    else openTypeChooser();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      setPinDropMode(false);
      closeTypeChooser();
      if (pinModalBd.style.display === 'flex') {
        pinModalBd.style.display = 'none';
        resetPinModal();
      }
    }
  });

  // Map click — only when explicitly in map-click mode.
  // The previously active type (set before entering map-click mode) is preserved.
  let mapClickTypeKey = null;
  map.on('click', (e) => {
    if (pinDropMode) {
      const tk = mapClickTypeKey || activeTypeKey || 'listing';
      setPinDropMode(false);
      openAddModal(tk, { lat: e.latlng.lat, lng: e.latlng.lng });
      return;
    }
    // Click on the map surface (not a marker, not a popup) closes any open
    // marker popup. Leaflet's map.click only fires when the click hits the
    // tile surface — clicks on markers / popups / clusters don't bubble here,
    // so this stays safe for in-progress edits.
    for (const key of Object.keys(markers)) {
      for (const m of markers[key]) {
        if (m.isPopupOpen && m.isPopupOpen()) m.closePopup();
      }
    }
  });

  // ─────────────────────────────────────────────────────────────────────────
  // Nominatim geocoding (OpenStreetMap)
  //   Public, no API key. Usage policy: max 1 req/sec, descriptive User-Agent
  //   or Referer (browser supplies Referer automatically), no heavy bulk use.
  //   https://operations.osmfoundation.org/policies/nominatim/
  // ─────────────────────────────────────────────────────────────────────────
  const geocodeCache = new Map();   // q -> results array (session-only)
  let geocodeTimer = null;
  let geocodeAbort = null;
  let lastGeocodeAt = 0;

  async function geocode(q) {
    if (geocodeCache.has(q)) return geocodeCache.get(q);

    // Enforce ≥1s between requests to Nominatim
    const since = Date.now() - lastGeocodeAt;
    if (since < 1100) await new Promise(r => setTimeout(r, 1100 - since));
    lastGeocodeAt = Date.now();

    if (geocodeAbort) geocodeAbort.abort();
    geocodeAbort = new AbortController();

    const url = 'https://nominatim.openstreetmap.org/search'
      + '?format=json&limit=6&addressdetails=1'
      + '&q=' + encodeURIComponent(q);
    const r = await fetch(url, {
      signal: geocodeAbort.signal,
      headers: { 'Accept-Language': 'en' }
    });
    if (!r.ok) throw new Error('Nominatim ' + r.status);
    const data = await r.json();
    geocodeCache.set(q, data);
    return data;
  }

  function renderGeocodeResults(results) {
    pinSearchResults.innerHTML = '';
    if (!results || results.length === 0) {
      pinSearchResults.classList.remove('has-results');
      pinSearchStatus.textContent = 'No matches.';
      return;
    }
    results.forEach(r => {
      const li = document.createElement('li');
      li.textContent = r.display_name;
      li.addEventListener('click', () => {
        const lat = parseFloat(r.lat);
        const lng = parseFloat(r.lon);
        // Use the first comma-segment as a concise label
        const shortLabel = (r.display_name || '').split(',').slice(0, 2).join(',').trim();
        setPendingLocation(lat, lng, shortLabel);
        pinSearchResults.innerHTML = '';
        pinSearchResults.classList.remove('has-results');
        pinSearchStatus.textContent = '';
        // Move the map to the selected location so the user can see context.
        map.flyTo([lat, lng], Math.max(map.getZoom(), 11), { duration: 0.6 });
        // Focus the first required field for the active type, if any
        if (activeTypeKey) {
          const firstKey = TYPES[activeTypeKey].addRequired[0];
          const el = pendingFieldInputs[firstKey];
          if (el) el.focus();
        }
      });
      pinSearchResults.appendChild(li);
    });
    pinSearchResults.classList.add('has-results');
    pinSearchStatus.textContent = results.length + ' result' + (results.length === 1 ? '' : 's') + ' — click one.';
  }

  pinSearchIn.addEventListener('input', () => {
    clearTimeout(geocodeTimer);
    const q = pinSearchIn.value.trim();
    if (q.length < 3) {
      pinSearchResults.innerHTML = '';
      pinSearchResults.classList.remove('has-results');
      pinSearchStatus.textContent = q.length === 0 ? '' : 'Keep typing…';
      return;
    }
    pinSearchStatus.textContent = 'Searching…';
    geocodeTimer = setTimeout(async () => {
      try {
        const results = await geocode(q);
        // Ignore stale responses if the input changed while we were waiting
        if (pinSearchIn.value.trim() !== q) return;
        renderGeocodeResults(results);
      } catch (e) {
        if (e.name === 'AbortError') return;
        console.error('geocode failed', e);
        pinSearchStatus.textContent = 'Search failed: ' + e.message;
      }
    }, 450);
  });
  pinSearchIn.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      // Pick the first result if present
      const first = pinSearchResults.querySelector('li');
      if (first) first.click();
    }
  });

  // Manual lat/lng input — updates pending location when both fields parse.
  function syncManualLatLng() {
    const lat = parseFloat(pinLatIn.value);
    const lng = parseFloat(pinLngIn.value);
    if (Number.isFinite(lat) && Number.isFinite(lng) &&
        lat >= -90 && lat <= 90 && lng >= -180 && lng <= 180) {
      setPendingLocation(lat, lng, null);
    }
  }
  pinLatIn.addEventListener('input', syncManualLatLng);
  pinLngIn.addEventListener('input', syncManualLatLng);

  // "Click on map instead" — close the modal, enter map-click mode.
  // Preserve the active type so when the user clicks the map, the modal
  // reopens for the same type.
  document.getElementById('pin-map-click-link').addEventListener('click', (e) => {
    e.preventDefault();
    mapClickTypeKey = activeTypeKey;
    pinModalBd.style.display = 'none';
    resetPinModal();
    setPinDropMode(true);
  });

  document.getElementById('pin-cancel').addEventListener('click', () => {
    pinModalBd.style.display = 'none';
    resetPinModal();
  });

  pinSaveBtn.addEventListener('click', async () => {
    if (!pendingPinLatLng || !activeTypeKey) return;
    const t = TYPES[activeTypeKey];

    // Build the doc from the dynamic field inputs
    const data = {
      lat: pendingPinLatLng.lat,
      lng: pendingPinLatLng.lng,
      deleted: false,
      createdBy: auth.currentUser ? auth.currentUser.email : null,
      createdAt: serverTimestamp(),
      updatedAt: serverTimestamp(),
    };
    for (const f of t.fields) {
      const el = pendingFieldInputs[f.key];
      if (el) data[f.key] = el.value;
    }

    // Derive a deterministic ID from the type's primary name field, falling
    // back to a timestamp if that field is empty (it shouldn't be — addRequired
    // includes the primary field — but be defensive).
    const primaryKey = t.addRequired[0];
    const primaryVal = (data[primaryKey] || '').trim();
    const baseSlug = primaryVal ? slugify(primaryVal) : ('item-' + Date.now().toString(36));
    let id = baseSlug;
    // Avoid clobbering an existing doc — append a short suffix if it exists.
    try {
      const existing = await getDoc(doc(db, t.collection, id));
      if (existing.exists()) {
        id = baseSlug + '-' + Math.random().toString(36).slice(2, 6);
      }
    } catch (_) { /* getDoc may fail offline; fall through and try setDoc */ }

    pinSaveBtn.disabled = true;
    try {
      await setDoc(doc(db, t.collection, id), data);
      logEvent('add', t.collection, id, docDisplayName(activeTypeKey, data));
      pinModalBd.style.display = 'none';
      resetPinModal();
      setPinDropMode(false);
    } catch (e) {
      console.error('save failed', e);
      alert('Save failed: ' + (e.code || e.message));
      pinSaveBtn.disabled = false;
    }
  });

  historyBtn.addEventListener('click', () => {
    activityPanel.style.display = activityPanel.style.display === 'flex' ? 'none' : 'flex';
  });
  document.getElementById('activity-close').addEventListener('click', () => {
    activityPanel.style.display = 'none';
  });
  // Tab switching inside the activity panel
  activityPanel.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      const target = btn.dataset.tab;
      activityPanel.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.tab === target));
      activityPanel.querySelectorAll('.tab-pane').forEach(p => {
        p.hidden = p.dataset.pane !== target;
      });
    });
  });

  // ─────────────────────────────────────────────────────────────────────────
  // Auth gate — drives the whole app lifecycle
  // ─────────────────────────────────────────────────────────────────────────
  function showAuthGate() {
    authGate.style.display = 'flex';
    userChip.style.display = 'none';
    sidebarEl.style.display = 'none';
    toolbar.style.display = 'none';
    activityPanel.style.display = 'none';
    pinModalBd.style.display = 'none';
    setPinDropMode(false);
  }
  function showAccessDenied(email) {
    authGate.style.display = 'flex';
    authCard.innerHTML =
      '<h1>Access denied</h1>' +
      '<p>Your account <span class="denied-email">' + escapeHtml(email) + '</span> is not on the allowlist for this map. Sign out and try a different Google account.</p>' +
      '<button id="signout-denied">Sign out</button>';
    document.getElementById('signout-denied').addEventListener('click', () => signOut(auth));
  }
  function showApp(email) {
    authGate.style.display = 'none';
    userEmailEl.textContent = email;
    userChip.style.display = 'flex';
    sidebarEl.style.display = 'block';
    toolbar.style.display = 'flex';
    // Invalidate Leaflet size in case the map was hidden under the gate
    setTimeout(() => map.invalidateSize(), 50);
    showLoading();
  }

  // Loading overlay — shown between successful sign-in and first render.
  // Hidden when the first onSnapshot batch has arrived AND render() has
  // populated markers, OR after an 8s failsafe in case something stalls.
  const loadingOverlay = document.getElementById('loading-overlay');
  let loadingFailsafe = null;
  function showLoading() {
    loadingOverlay.classList.add('visible');
    if (loadingFailsafe) clearTimeout(loadingFailsafe);
    loadingFailsafe = setTimeout(hideLoading, 8000);
  }
  function hideLoading() {
    loadingOverlay.classList.remove('visible');
    if (loadingFailsafe) { clearTimeout(loadingFailsafe); loadingFailsafe = null; }
  }

  // ─────────────────────────────────────────────────────────────────────────
  // Presence — "who else is on the page right now"
  //
  //   Each browser writes its own row to presence/<id> with lastSeen.
  //   - Heartbeat every 20s while the tab is visible.
  //   - On visibilitychange(hidden) / beforeunload: one final write so the
  //     UI updates promptly for others, and a best-effort deleteDoc on unload.
  //   - Listener renders chips for everyone else with lastSeen > now - 60s.
  //   - A 10s setInterval re-runs the renderer so stale rows fade out without
  //     needing a new snapshot.
  //
  // Doc ID = email with '.' → '_' (Firestore doc IDs can't contain '.' as a
  // path segment cleanly; we keep it readable rather than hashing).
  // ─────────────────────────────────────────────────────────────────────────
  const presenceEl = document.getElementById('presence');
  let presenceState = [];          // raw docs from listener
  let presenceHeartbeatTimer = null;
  let presenceRerenderTimer  = null;
  let presenceUnsub = null;
  let presenceSelfId = null;
  let presenceSelfEmail = null;

  function presenceDocIdFor(email) {
    return email.toLowerCase().replace(/[^a-z0-9@_-]/g, '_');
  }

  async function writePresence() {
    if (!presenceSelfId) return;
    try {
      await setDoc(doc(db, 'presence', presenceSelfId), {
        email: presenceSelfEmail,
        lastSeen: serverTimestamp(),
      }, { merge: true });
    } catch (e) {
      // Presence is best-effort. Don't spam the console on rule failures
      // during the initial deploy; log once and continue.
      if (!writePresence._warned) {
        console.warn('presence write failed (check Firestore rules for presence/*):', e.code || e.message);
        writePresence._warned = true;
      }
    }
  }

  function renderPresence() {
    presenceEl.innerHTML = '';
    if (!presenceSelfEmail) { presenceEl.style.display = 'none'; return; }
    const now = Date.now();
    const active = presenceState
      .filter(p => {
        if (!p.email) return false;
        const ms = p.lastSeen && p.lastSeen.toMillis ? p.lastSeen.toMillis() : 0;
        return ms && (now - ms) < 60_000; // active in last 60s
      })
      // Put self first so the row order is stable across browsers
      .sort((a, b) => {
        const as = a.email.toLowerCase() === presenceSelfEmail ? 0 : 1;
        const bs = b.email.toLowerCase() === presenceSelfEmail ? 0 : 1;
        if (as !== bs) return as - bs;
        return a.email.localeCompare(b.email);
      });
    if (active.length === 0) { presenceEl.style.display = 'none'; return; }

    for (const p of active) {
      const ageMs = now - (p.lastSeen && p.lastSeen.toMillis ? p.lastSeen.toMillis() : 0);
      const isIdle = ageMs > 25_000;
      const isSelf = p.email.toLowerCase() === presenceSelfEmail;
      const chip = document.createElement('span');
      chip.className = 'chip' + (isIdle ? ' idle' : '') + (isSelf ? ' self' : '');
      const dot = document.createElement('span');
      dot.className = 'dot';
      chip.appendChild(dot);
      const isJoanna = p.email.toLowerCase() === 'joannamary888@gmail.com';
      const text = document.createElement('span');
      text.textContent = p.email + (isSelf ? ' (you)' : '') + (isJoanna ? ' ❤️' : '');
      chip.appendChild(text);
      presenceEl.appendChild(chip);
    }
    presenceEl.style.display = 'flex';
  }

  function startPresence(email) {
    presenceSelfEmail = email.toLowerCase();
    presenceSelfId    = presenceDocIdFor(presenceSelfEmail);

    // First heartbeat immediately
    writePresence();
    // Then every 20s while the tab is visible
    presenceHeartbeatTimer = setInterval(() => {
      if (document.visibilityState === 'visible') writePresence();
    }, 20_000);

    // Listen to all presence rows for the rendering side
    presenceUnsub = onSnapshot(collection(db, 'presence'), snap => {
      presenceState = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderPresence();
    }, err => {
      console.warn('presence listener:', err.code || err.message);
    });

    // Re-render every 10s so stale chips age out / disappear without
    // waiting for a new snapshot. Same tick refreshes the history panel's
    // relative-time labels (30s ago → 1m ago → …).
    presenceRerenderTimer = setInterval(() => {
      renderPresence();
      renderHistoryPanel();
    }, 10_000);

    // Tab visibility change: write immediately so we transition states fast
    document.addEventListener('visibilitychange', presenceVisibilityHandler);
    // Unload: best-effort delete + final write
    window.addEventListener('pagehide', presenceUnloadHandler);
    window.addEventListener('beforeunload', presenceUnloadHandler);
  }

  function presenceVisibilityHandler() {
    if (document.visibilityState === 'visible') writePresence();
  }

  function presenceUnloadHandler() {
    if (!presenceSelfId) return;
    // deleteDoc on unload is best-effort; the browser may cut us off before
    // the request flushes. The 60s freshness window in the renderer means
    // others will see us drop off within a minute even if the delete fails.
    try { deleteDoc(doc(db, 'presence', presenceSelfId)); } catch (_) {}
  }

  function stopPresence() {
    if (presenceHeartbeatTimer) clearInterval(presenceHeartbeatTimer);
    if (presenceRerenderTimer)  clearInterval(presenceRerenderTimer);
    presenceHeartbeatTimer = null;
    presenceRerenderTimer  = null;
    if (presenceUnsub) { try { presenceUnsub(); } catch (_) {} presenceUnsub = null; }
    document.removeEventListener('visibilitychange', presenceVisibilityHandler);
    window.removeEventListener('pagehide', presenceUnloadHandler);
    window.removeEventListener('beforeunload', presenceUnloadHandler);
    // Tear down our own row so others see us go offline immediately.
    if (presenceSelfId) {
      try { deleteDoc(doc(db, 'presence', presenceSelfId)); } catch (_) {}
    }
    presenceSelfId = null;
    presenceSelfEmail = null;
    presenceState = [];
    renderPresence();
  }

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      detachListeners();
      stopPresence();
      didInitialFit = false;
      clearMarkers();
      hideLoading();
      showAuthGate();
      return;
    }
    const email = (user.email || '').toLowerCase();
    const allowed = ALLOWED_EMAILS.map(e => e.toLowerCase()).includes(email);
    if (!allowed) {
      detachListeners();
      stopPresence();
      showAccessDenied(user.email || '(no email)');
      return;
    }
    showApp(user.email);
    try {
      await seedIfEmpty();
    } catch (e) {
      console.warn('seed failed (rules may not allow writes yet):', e);
    }
    try {
      await backfillDeletedFlag();
    } catch (e) {
      console.warn('backfill failed:', e);
    }
    attachListeners();
    startPresence(user.email);
  });
</script>
</body>
</html>
